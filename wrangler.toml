name = "germanyplanning"
compatibility_date = "2024-01-01"
pages_build_output_dir = "."

# KV namespace binding
# After creating your KV namespace in the Cloudflare dashboard,
# replace YOUR_KV_NAMESPACE_ID_HERE with the actual ID.
# See DEPLOY.md Step 6 for instructions.
#
# NOTE: You also need to add the KV binding in the Cloudflare Pages
# dashboard under Settings → Functions → KV namespace bindings.
# The wrangler.toml entry below is for reference/local dev only.

[[kv_namespaces]]
binding = "PROGRESS"
id = "YOUR_KV_NAMESPACE_ID_HERE"
